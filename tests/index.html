<script type='module'>
  import html from '../src/index.js'

  const start = performance.now()

  document.body.append(html`
    <section>
      ${[...Array(3)].map(() => 
        html`
          <c- ${Counter}></c->
        `
      )}
    </section>
  `)

  console.log(performance.now() - start)

  function Counter({ self, store }) {
    const count = store(0)
    const count2 = store(0)

    return html`
      <button class='counter' @click=${() => count(count() + 1)}>
        Counter: ${count()}
        <c- ${Indicator}></c->
      </button>
    `
  }

  function Indicator({ store }) {
    const count = store(0)

    return html`
      <div class='indicator' @click=${() => count(count() + 1)}>
        ${count()}
      </div>
    `
  }
</script>

<style>
  * {
    margin: 0;
    padding: 0;
    border: 0;
    box-sizing: border-box;
  }

  html {
    font-family: sans-serif;
  }

  section {
    display: flex;
    gap: 1rem;
    padding: 2rem;
  }

  .counter {
    font-size: 1rem;
    display: inline-block;
    background-color: #0a0a0a;
    color: #fafafa;
    padding: 1rem 2rem;
    border-radius: 9999px;
    transition: 0.2s;
    cursor: pointer;
  }

  .counter:hover {
    background-color: #2a2a2a;
  }

  .indicator {
    position: relative;
    width: 1rem;
    height: 1rem;
    border-radius: 9999px;
    background-color: #f72435;
    z-index: 100;
  }

  .indicator:hover {
    background-color: #4424f7;
  }
</style>
